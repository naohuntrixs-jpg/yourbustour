<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유어버스투어 - 회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen py-10 px-4">

    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-orange-500 italic cursor-pointer" onclick="location.href='index.html'">유어버스투어</h1>
            <p class="text-gray-500 mt-2">더 넓은 세상으로의 초대, 유어버스투어와 함께하세요!</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="flex border-b text-center">
                <div class="flex-1 py-4 bg-orange-500 text-white font-bold">01. 정보입력</div>
                <div class="flex-1 py-4 bg-gray-50 text-gray-400 font-bold">02. 가입완료</div>
            </div>

            <form class="p-8 md:p-12 space-y-8">
                <section class="space-y-4">
                    <h3 class="text-lg font-bold text-gray-800 border-l-4 border-orange-500 pl-3">계정 정보</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <div class="md:col-span-3">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">아이디 (이메일)</label>
                            <input type="email" required class="w-full bg-gray-50 border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="example@mail.com">
                        </div>
                        <button type="button" class="bg-gray-800 text-white py-3 rounded-xl font-bold text-sm hover:bg-black transition">중복확인</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">비밀번호</label>
                            <input type="password" required class="w-full bg-gray-50 border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="8자 이상 입력">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">비밀번호 확인</label>
                            <input type="password" required class="w-full bg-gray-50 border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="다시 입력">
                        </div>
                    </div>
                </section>

                <section class="space-y-4">
                    <h3 class="text-lg font-bold text-gray-800 border-l-4 border-orange-500 pl-3">개인 정보</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">이름</label>
                            <input type="text" required class="w-full bg-gray-50 border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="실명을 입력하세요">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">연락처</label>
                            <input type="tel" required class="w-full bg-gray-50 border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="010-0000-0000">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">생년월일</label>
                            <input type="date" class="w-full bg-gray-50 border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-orange-500 outline-none">
                        </div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">성별</label>
                            <div class="flex space-x-2">
                                <label class="flex-1 bg-gray-50 py-3 rounded-xl text-center cursor-pointer border-2 border-transparent hover:border-orange-200 has-[:checked]:border-orange-500 has-[:checked]:bg-orange-50 transition">
                                    <input type="radio" name="gender" class="hidden" checked> <span class="text-sm font-bold">남성</span>
                                </label>
                                <label class="flex-1 bg-gray-50 py-3 rounded-xl text-center cursor-pointer border-2 border-transparent hover:border-orange-200 has-[:checked]:border-orange-500 has-[:checked]:bg-orange-50 transition">
                                    <input type="radio" name="gender" class="hidden"> <span class="text-sm font-bold">여성</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="bg-gray-50 p-6 rounded-2xl space-y-3">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" required class="w-5 h-5 rounded text-orange-500 focus:ring-orange-500">
                        <span class="text-sm font-bold text-gray-700">이용약관 및 개인정보 수집 동의 (필수)</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 rounded text-orange-500 focus:ring-orange-500">
                        <span class="text-sm text-gray-600">이벤트 및 마케팅 정보 수신 동의 (선택)</span>
                    </label>
                </section>

                <button type="submit" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-orange-200 hover:bg-orange-600 hover:-translate-y-1 transition-all duration-200">
                    회원가입 완료하기
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-gray-500 text-sm">
            이미 회원이신가요? 
            <a href="login.html" class="text-orange-500 font-bold border-b-2 border-orange-500 ml-1">로그인 하기</a>
        </p>
    </div>

</body>
</html>
