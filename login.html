<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유어버스투어 - 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <h1 onclick="location.href='index.html'" class="text-3xl font-black text-orange-500 italic cursor-pointer">유어버스투어</h1>
            <p class="text-gray-400 text-sm mt-2">즐거운 산행의 시작, 함께해요!</p>
        </div>

        <form class="space-y-4">
            <div>
                <input type="email" placeholder="이메일 주소" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition text-sm">
            </div>
            <div>
                <input type="password" placeholder="비밀번호" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition text-sm">
            </div>
            <button type="button" onclick="location.href='index.html'" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg hover:bg-orange-600 transition">로그인</button>
        </form>

        <div class="relative my-8 text-center">
            <hr class="border-gray-100">
            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-xs text-gray-300 font-bold uppercase tracking-widest">간편 로그인</span>
        </div>

        <div class="space-y-3">
            <button class="w-full py-4 bg-[#03C75A] text-white rounded-2xl font-bold flex items-center justify-center space-x-3 hover:opacity-90 transition shadow-sm">
                <span class="text-xl font-black italic">N</span>
                <span class="text-sm">네이버로 시작하기</span>
            </button>

            <button class="w-full py-4 bg-[#FEE500] text-[#3c1e1e] rounded-2xl font-bold flex items-center justify-center space-x-3 hover:opacity-90 transition shadow-sm">
                <i class="fa-solid fa-comment text-lg"></i>
                <span class="text-sm">카카오톡으로 시작하기</span>
            </button>

            <button class="w-full py-4 bg-white border border-gray-200 text-gray-600 rounded-2xl font-bold flex items-center justify-center space-x-3 hover:bg-gray-50 transition shadow-sm">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                <span class="text-sm">Google로 시작하기</span>
            </button>
        </div>

        
        <div class="relative my-8 text-center">
            <hr class="border-gray-100">
            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-xs text-gray-300 font-bold uppercase tracking-widest">간편 로그인</span>
        </div>

        <div class="mt-8 text-center text-sm text-gray-400">
            아직 회원이 아니신가요? 
            <a href="signup.html" class="text-orange-500 font-bold hover:underline ml-1">회원가입 하기</a>
        </div>
    </div> </body>
</html>
