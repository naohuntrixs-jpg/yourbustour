<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유어버스투어 - 통합 예약 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .sticky-panel { position: sticky; top: 100px; height: calc(100vh - 120px); overflow-y: auto; }
    .day-sun { color: #ef4444; } .day-sat { color: #3b82f6; }
    .rolling-container { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 20px; padding: 10px 0; -ms-overflow-style: none; scrollbar-width: none; }
    .rolling-container::-webkit-scrollbar { display: none; }
    .product-card { min-width: 280px; max-width: 280px; transition: transform 0.3s; cursor: pointer; }
    .product-card:hover { transform: translateY(-5px); }
    /* 카테고리 애니메이션 */
    .nav-link { position: relative; transition: color 0.3s; }
    .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0; background-color: #ff6b00; transition: width 0.3s; }
    .nav-link:hover::after { width: 100%; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

<header class="bg-white border-b py-4 shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
    <h1 onclick="location.href='index.html'" class="text-3xl font-black text-[#1A2F53] italic cursor-pointer">
      유어버스<span class="text-[#ff6b00]">투어</span>
    </h1>

    <nav class="hidden md:flex space-x-10 text-sm font-black text-gray-600">
      <a href="index.html" class="nav-link text-[#1A2F53]">홈</a>
      <a href="tour_list.html" class="nav-link hover:text-[#1A2F53]">여행상품</a>
      <a href="community.html" class="nav-link hover:text-[#1A2F53]">커뮤니티</a>
      <a href="notice.html" class="nav-link hover:text-[#1A2F53]">공지사항</a>
      <a href="cs.html" class="nav-link hover:text-[#1A2F53]">고객센터</a>
    </nav>
    
    <div class="flex items-center space-x-4">
      <button onclick="location.href='login.html'" class="text-xs font-bold text-gray-400 hover:text-[#1A2F53]">로그인</button>
      <button class="md:hidden text-[#1A2F53] text-xl"><i class="fa-solid fa-bars"></i></button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-10">
  <div class="flex flex-col lg:flex-row gap-10">
    <div class="flex-1 overflow-hidden">
      <div class="bg-white rounded-[32px] shadow-xl p-8 border border-gray-100 mb-10">
        <div class="flex justify-between items-center mb-8">
          <button id="btnPrevMonth" class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full transition"><i class="fa-solid fa-chevron-left"></i></button>
          <h2 id="calendarTitle" class="text-2xl font-black text-[#1A2F53]"></h2>
          <button id="btnNextMonth" class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full transition"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="calendar-grid text-center text-xs font-bold text-gray-300 mb-4 uppercase tracking-widest">
          <div class="day-sun text-red-400">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="day-sat text-blue-400">Sat</div>
        </div>
        <div id="calendarBody" class="calendar-grid gap-2"></div>
      </div>

      <h3 class="text-xl font-black text-[#1A2F53] mb-6 flex items-center">
        <span class="w-8 h-8 bg-orange-100 text-[#ff6b00] rounded-lg flex items-center justify-center mr-3 text-sm">
          <i class="fa-solid fa-fire"></i>
        </span>
        지금 가장 인기있는 여행
      </h3>
      <div id="rollingList" class="rolling-container"></div>
    </div>

    <aside class="w-full lg:w-[400px]">
      <div id="reserveForm" class="hidden sticky-panel bg-white rounded-[32px] shadow-2xl p-8 border border-gray-100">
        <div class="relative mb-6">
          <img id="selectedTripImg" class="w-full h-48 object-cover rounded-[24px] shadow-md" src="">
          <span class="absolute top-4 left-4 bg-[#ff6b00] text-white text-[10px] font-bold px-3 py-1 rounded-full">BEST</span>
        </div>
        <h3 id="selectedTripName" class="text-2xl font-black text-[#1A2F53] mb-2 leading-tight"></h3>
        <p id="selectedTripPrice" class="text-2xl font-black text-[#ff6b00] mb-6"></p>
        
        <div class="space-y-4 mb-8">
          <div class="bg-gray-50 p-4 rounded-2xl">
            <p class="text-[11px] font-bold text-gray-400 mb-1">일정 안내</p>
            <p id="pItinerary" class="text-sm text-gray-600 leading-relaxed"></p>
          </div>
        </div>

        <div class="bg-[#1A2F53] p-5 rounded-2xl mb-6">
          <div class="flex justify-between items-center text-white font-bold mb-2">
            <span class="text-sm opacity-70">총 결제 금액</span>
            <span id="totalAmountDisplay" class="text-xl text-[#ff6b00]">0원</span>
          </div>
        </div>

        <button onclick="handlePayment()" class="w-full bg-[#ff6b00] text-white py-5 rounded-[20px] font-black text-lg shadow-lg shadow-orange-200 hover:bg-[#e65f00] transition-all mb-3">
          무통장 입금으로 예약하기
        </button>
        <button onclick="closeReserve()" class="w-full text-gray-400 text-xs font-bold underline">다른 날짜 보기</button>
      </div>

      <div id="emptyMsg" class="h-[400px] flex flex-col items-center justify-center text-gray-300 border-2 border-dashed border-gray-200 rounded-[32px] text-center p-10">
        <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-4">
          <i class="fa-solid fa-calendar-day text-2xl"></i>
        </div>
        <p class="font-bold text-gray-400 leading-relaxed">달력에서 원하시는<br>여행 날짜를 선택해주세요.</p>
      </div>
    </aside>
  </div>
</main>

<a href="https://open.kakao.com/o/YOUR_CODE" target="_blank" class="fixed bottom-8 right-8 z-[9999] group">
  <div class="absolute right-full mr-4 top-1/2 -translate-y-1/2 bg-white px-4 py-2 rounded-xl shadow-xl border text-xs font-black text-[#1A2F53] whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">
    무엇이든 물어보세요! 👋
  </div>
  <div class="w-16 h-16 bg-[#FEE500] rounded-2xl flex items-center justify-center shadow-2xl hover:scale-110 hover:rotate-6 transition-all">
    <i class="fa-solid fa-comment text-[#3C1E1E] text-3xl"></i>
  </div>
</a>

<script>
  let viewYear = new Date().getFullYear();
  let viewMonth = new Date().getMonth();
  let db = [];

  function init() {
    try {
      const rawData = localStorage.getItem('maeil_db');
      db = rawData ? JSON.parse(rawData) : [];
      renderAll();
    } catch (e) {
      db = [];
    }
  }

  function renderAll() {
    renderCalendar();
    renderRollingList();
  }

  function renderCalendar() {
    const title = document.getElementById('calendarTitle');
    const body = document.getElementById('calendarBody');
    title.innerText = `${viewYear}.${String(viewMonth + 1).padStart(2, '0')}`;
    body.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) body.innerHTML += '<div></div>';

    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const dayObj = new Date(viewYear, viewMonth, d);
      const isToday = new Date().toDateString() === dayObj.toDateString() ? 'ring-2 ring-[#ff6b00] ring-inset' : '';
      
      let html = `<div class="bg-white p-2 h-32 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition ${isToday}">
                    <div class="text-xs font-black text-gray-400 mb-2">${d}</div>`;
      
      db.filter(x => x.date === dateStr).forEach(p => {
        html += `<div onclick='selectTrip(${JSON.stringify(p).replace(/'/g, "&apos;")})' 
                     class="bg-[#1A2F53] text-white text-[10px] p-2 rounded-xl mb-1 cursor-pointer truncate font-bold hover:bg-[#ff6b00] transition-colors">
                   ${p.name}
                 </div>`;
      });
      body.innerHTML += html + '</div>';
    }
  }

  function renderRollingList() {
    const list = document.getElementById('rollingList');
    if(db.length === 0) {
        list.innerHTML = "<p class='text-gray-300 py-10'>등록된 여행 상품이 없습니다.</p>";
        return;
    }
    list.innerHTML = db.slice(0, 10).map(p => `
      <div class="product-card bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden" onclick='selectTrip(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
        <img src="${p.image_url || 'https://via.placeholder.com/300x200'}" class="w-full h-36 object-cover">
        <div class="p-5">
          <h4 class="font-black text-[#1A2F53] truncate mb-1">${p.name}</h4>
          <p class="text-sm font-bold text-[#ff6b00]">${Number(p.price).toLocaleString()}원~</p>
        </div>
      </div>
    `).join('');
  }

  function selectTrip(p) {
    document.getElementById('emptyMsg').classList.add('hidden');
    document.getElementById('reserveForm').classList.remove('hidden');
    document.getElementById('selectedTripName').innerText = p.name;
    document.getElementById('selectedTripPrice').innerText = Number(p.price).toLocaleString() + '원';
    document.getElementById('totalAmountDisplay').innerText = Number(p.price).toLocaleString() + '원';
    document.getElementById('pItinerary').innerText = p.itinerary || '자세한 일정은 예약 후 안내드립니다.';
    document.getElementById('selectedTripImg').src = p.image_url || 'https://via.placeholder.com/400x300';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function closeReserve() {
    document.getElementById('reserveForm').classList.add('hidden');
    document.getElementById('emptyMsg').classList.remove('hidden');
  }

  function handlePayment() {
    alert('예약 신청이 접수되었습니다!\n입금 확인 후 확정 문자를 발송해 드립니다.');
  }

  document.getElementById('btnPrevMonth').onclick = () => { viewMonth--; if(viewMonth<0){viewMonth=11; viewYear--;} renderCalendar(); };
  document.getElementById('btnNextMonth').onclick = () => { viewMonth++; if(viewMonth>11){viewMonth=0; viewYear++;} renderCalendar(); };

  window.onload = init;
</script>
</body>
</html>
