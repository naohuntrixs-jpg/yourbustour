<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유어버스투어 - 커뮤니티</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b py-4 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-3xl font-black text-orange-500 italic cursor-pointer" onclick="location.href='index.html'">유어버스투어</h1>
            <nav class="hidden md:flex space-x-8 text-gray-700 font-bold">
                <a href="index.html" class="hover:text-orange-500 transition">산행/여행</a>
                <a href="#" class="hover:text-orange-500 transition">섬여행</a>
                <a href="#" class="text-orange-500">커뮤니티</a>
            </nav>
            <div class="flex items-center space-x-4">
                <button class="bg-gray-100 px-4 py-2 rounded-full text-sm font-bold text-gray-600" onclick="location.href='mypage.html'">마이페이지</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto py-10 px-4">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-black text-gray-800">커뮤니티</h2>
                <p class="text-gray-500 mt-2">산행 후기 및 즐거운 여행 이야기를 들려주세요.</p>
            </div>
            <button onclick="openWriteModal()" class="bg-orange-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-orange-600 transition flex items-center space-x-2">
                <i class="fa-solid fa-pen"></i>
                <span>글쓰기</span>
            </button>
        </div>

        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2">
            <button class="bg-gray-800 text-white px-5 py-2 rounded-full text-sm font-bold flex-shrink-0">전체보기</button>
            <button class="bg-white border text-gray-600 px-5 py-2 rounded-full text-sm font-bold hover:bg-gray-50 flex-shrink-0">산행후기</button>
            <button class="bg-white border text-gray-600 px-5 py-2 rounded-full text-sm font-bold hover:bg-gray-50 flex-shrink-0">자유게시판</button>
            <button class="bg-white border text-gray-600 px-5 py-2 rounded-full text-sm font-bold hover:bg-gray-50 flex-shrink-0">갤러리</button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="hidden md:grid grid-cols-12 bg-gray-50 border-b p-4 text-xs font-bold text-gray-400 uppercase tracking-widest text-center">
                <div class="col-span-1">번호</div>
                <div class="col-span-7">제목</div>
                <div class="col-span-2">작성자</div>
                <div class="col-span-1">조회</div>
                <div class="col-span-1">날짜</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 p-4 border-b hover:bg-orange-50/30 transition cursor-pointer items-center">
                <div class="hidden md:block col-span-1 text-center text-gray-400 text-sm">125</div>
                <div class="col-span-12 md:col-span-7 flex items-center space-x-3">
                    <span class="bg-orange-100 text-orange-600 text-[10px] font-bold px-2 py-0.5 rounded">후기</span>
                    <span class="font-bold text-gray-800">[한라산] 눈꽃이 너무 예뻤던 최고의 산행이었습니다!</span>
                    <span class="text-orange-500 text-xs font-bold">[5]</span>
                </div>
                <div class="col-span-6 md:col-span-2 text-sm text-gray-500 mt-2 md:mt-0 md:text-center">꽃게대장</div>
                <div class="hidden md:block col-span-1 text-center text-gray-400 text-sm">1,240</div>
                <div class="col-span-6 md:col-span-1 text-sm text-gray-400 mt-2 md:mt-0 text-right md:text-center">02-22</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 p-4 border-b hover:bg-orange-50/30 transition cursor-pointer items-center">
                <div class="hidden md:block col-span-1 text-center text-gray-400 text-sm">124</div>
                <div class="col-span-12 md:col-span-7 flex items-center space-x-3">
                    <span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded">자유</span>
                    <span class="font-bold text-gray-800">다음 주 울릉도 날씨 어떤가요?</span>
                    <i class="fa-regular fa-image text-gray-400 text-xs"></i>
                </div>
                <div class="col-span-6 md:col-span-2 text-sm text-gray-500 mt-2 md:mt-0 md:text-center">산악인A</div>
                <div class="hidden md:block col-span-1 text-center text-gray-400 text-sm">450</div>
                <div class="col-span-6 md:col-span-1 text-sm text-gray-400 mt-2 md:mt-0 text-right md:text-center">02-21</div>
            </div>
        </div>

        <div class="mt-8 flex justify-center">
            <div class="relative w-full max-w-md">
                <input type="text" class="w-full bg-white border border-gray-200 rounded-2xl py-3 pl-10 pr-4 outline-none focus:ring-2 focus:ring-orange-500" placeholder="관심 있는 게시글을 검색하세요.">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-300"></i>
            </div>
        </div>
    </main>

    <div id="writeModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[60] p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h3 class="text-xl font-bold">새 글 작성하기</h3>
                <button onclick="closeWriteModal()" class="text-gray-400 hover:text-black text-2xl">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-4 gap-4">
                    <select class="col-span-1 border rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                        <option>산행후기</option>
                        <option>자유게시판</option>
                    </select>
                    <input type="text" placeholder="제목을 입력하세요" class="col-span-3 border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                </div>
                <textarea rows="10" placeholder="즐거웠던 여행 이야기를 들려주세요." class="w-full border rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-orange-500 text-sm resize-none"></textarea>
                <div class="border-2 border-dashed border-gray-100 rounded-2xl p-6 text-center text-gray-400 hover:bg-gray-50 cursor-pointer transition">
                    <i class="fa-solid fa-camera text-2xl mb-2"></i>
                    <p class="text-xs font-bold">사진 첨부 (최대 5장)</p>
                </div>
                <div class="flex space-x-3">
                    <button onclick="closeWriteModal()" class="flex-1 py-4 bg-gray-100 rounded-2xl font-bold text-gray-500 hover:bg-gray-200 transition">취소</button>
                    <button class="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg hover:bg-orange-600 transition">등록하기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openWriteModal() {
            document.getElementById('writeModal').classList.replace('hidden', 'flex');
        }
        function closeModal() {
            document.getElementById('writeModal').classList.replace('flex', 'hidden');
        }
    </script>
</body>
</html>
